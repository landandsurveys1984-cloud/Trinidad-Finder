<!DOCTYPE html>
<html>
<head>
    <title>Trinidad Region Finder</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/turf@6/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; }
        #controls { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; border: 1px solid #ddd; }
        input { padding: 10px; width: 140px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #map { height: 600px; border-radius: 8px; }
        .result-box { margin-top: 10px; font-size: 1.2em; color: #333; }
    </style>
</head>
<body>
    <div id="controls">
        <h3>Enter UTM 20N Coordinates</h3>
        <input type="number" id="easting" placeholder="Easting (m)">
        <input type="number" id="northing" placeholder="Northing (m)">
        <button onclick="checkLocation()">Find Area</button>
        <div id="result" class="result-box">Result will appear here...</div>
    </div>
    <div id="map"></div>

    <script>
        // UTM Zone 20N Definition
        const utm20n = "+proj=utm +zone=20 +datum=WGS84 +units=m +no_defs";
        const wgs84 = "+proj=longlat +datum=WGS84 +no_defs";

        const map = L.map('map').setView([10.45, -61.2], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let boundaryData;
        fetch('boundaries.json')
            .then(res => res.json())
            .then(data => {
                boundaryData = data;
                L.geoJSON(data, { style: { color: "#007bff", weight: 1, fillOpacity: 0.2 } }).addTo(map);
            });

        function checkLocation() {
            const e = parseFloat(document.getElementById('easting').value);
            const n = parseFloat(document.getElementById('northing').value);
            
            // Convert UTM to Lat/Long for the map
            const lngLat = proj4(utm20n, wgs84, [e, n]);
            const pt = turf.point(lngLat);

            let match = "Not found within any region.";
            turf.featureEach(boundaryData, (f) => {
                if (turf.booleanPointInPolygon(pt, f)) {
                    match = "This falls within: " + f.properties.NAME_1;
                }
            });

            document.getElementById('result').innerHTML = `<b>${match}</b>`;
            L.marker([lngLat[1], lngLat[0]]).addTo(map).bindPopup(match).openPopup();
            map.setView([lngLat[1], lngLat[0]], 13);
        }
    </script>
</body>
</html>
